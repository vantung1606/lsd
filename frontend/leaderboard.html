<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Bảng xếp hạng | Lịch sử Đảng Quiz</title>
    <link rel="stylesheet" href="./styles.css?v=9" />
  </head>
  <body>
    <main class="page">
      <section class="card scrollable">
        <button id="music-toggle" class="music-toggle-btn" title="Bật/Tắt nhạc nền">🎵</button>
        <div class="kitty-bow">🎀</div>
        <h1>Bảng xếp hạng</h1>
        <p class="subtitle">Mỗi phần có một bảng xếp hạng riêng</p>

        <div class="leaderboard-filters">
          <label for="section-select">Phần thi:</label>
          <select id="section-select"></select>
        </div>

        <div class="leaderboard-actions">
          <button id="top10-button" class="secondary-button">Top 10</button>
          <button id="top50-button" class="secondary-button">Top 50</button>
        </div>

        <div class="leaderboard-table-wrapper">
          <table class="leaderboard-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Người chơi</th>
                <th>Đúng</th>
                <th>Điểm</th>
                <th>Lượt</th>
              </tr>
            </thead>
            <tbody id="leaderboard-body"></tbody>
          </table>
        </div>

        <a class="primary-button link-button back-link" href="./menu.html">Về Menu</a>
      </section>
    </main>

    <script src="./scripts/api.js"></script>
    <script src="./scripts/leaderboard.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Đăng nhập | Lịch sử Đảng Quiz</title>
    <link rel="stylesheet" href="./styles.css?v=11" />
  </head>
  <body class="auth-theme">
    <main class="page auth-page">
      <section class="card auth-card">
        <div class="auth-bow">🎀</div>
        <div class="auth-coconut auth-coconut-top">🥥</div>
        <div class="auth-coconut auth-coconut-bottom">🥥</div>

        <h1 class="auth-title">🌸 Lịch sử Đảng Quiz 🎀</h1>
        <p class="auth-subtitle">🥳 Đăng ký hoặc đăng nhập để bắt đầu đua top 🏆</p>

        <div class="auth-tabs">
          <button type="button" id="register-tab" class="auth-tab-button active">Đăng ký</button>
          <button type="button" id="login-tab" class="auth-tab-button">Đăng nhập</button>
        </div>

        <form id="auth-form" class="auth-form" novalidate>
          <label for="username">Tên tài khoản</label>
          <div class="auth-input-wrap">
            <input id="username" type="text" placeholder="Nhập tên của bạn..." required minlength="3" />
            <span class="auth-input-icon">🥥</span>
          </div>

          <label for="password">Mật khẩu</label>
          <div class="auth-input-wrap">
            <input id="password" type="password" placeholder="Nhập mật khẩu..." required minlength="6" />
            <span class="auth-input-icon">🌸</span>
          </div>

          <button type="submit" id="auth-submit" class="auth-submit-button">🏆 ✨ Tiếp tục</button>
        </form>

        <p id="auth-message" class="auth-message"></p>
      </section>
    </main>

    <script src="./scripts/api.js"></script>
    <script src="./scripts/auth.js"></script>
  </body>
</html>
